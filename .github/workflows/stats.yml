name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"   # todo dia às 03:00 UTC
  workflow_dispatch: {}     # permite rodar manualmente na aba Actions
  push:
    paths:
      - ".github/workflows/stats.yml"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&timezone=America/Sao_Paulo
          path: profile/streak.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile stats" || exit 0
          git push
